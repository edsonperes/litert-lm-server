name: mlc-llm-server
services:
  mlc-llm:
    image: ghcr.io/edsonperes/litert-lm-server:0.3.2
    container_name: mlc-llm-server
    restart: unless-stopped
    privileged: true
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    environment:
      PORT: "8000"
      MODEL: RedPajama-INCITE-Chat-3B-v1-q4f16_1
    volumes:
      - type: bind
        source: /lib/firmware
        target: /lib/firmware
        read_only: true
    deploy:
      resources:
        reservations:
          memory: "4096M"
    x-casaos:
      envs:
        - container: MODEL
          description:
            en_US: Model name (pre-loaded in image)
            pt_BR: Nome do modelo (pre-carregado na imagem)
      ports:
        - container: "8000"
          description:
            en_US: OpenAI-compatible API port
            pt_BR: Porta da API compativel com OpenAI
      volumes:
        - container: /lib/firmware
          description:
            en_US: Mali GPU firmware (read-only)
            pt_BR: Firmware da GPU Mali (somente leitura)

x-casaos:
  architectures:
    - arm64
  main: mlc-llm
  author: edsonperes
  category: AI
  description:
    en_US: GPU-accelerated LLM inference on Mali G610 using MLC-LLM with RedPajama 3B. OpenAI-compatible API for OpenWebUI. Runs on OrangePi 5 / RK3588.
    pt_BR: Inferencia LLM com aceleracao GPU Mali G610 usando MLC-LLM com RedPajama 3B. API compativel com OpenAI para OpenWebUI. Roda no OrangePi 5 / RK3588.
  developer: Community
  icon: https://raw.githubusercontent.com/edsonperes/litert-lm-server/main/icon.png
  tagline:
    en_US: GPU-accelerated LLM on OrangePi 5
    pt_BR: LLM com GPU no OrangePi 5
  title:
    en_US: MLC-LLM Server
    pt_BR: MLC-LLM Server
  tips:
    before_install:
      en_US: |
        Requirements:
        - OrangePi 5 or RK3588 board with 4GB+ RAM
        - Mali G610 GPU (OpenCL)
        - Image is ~4.5GB (model included)
        - Connect OpenWebUI: http://<device-ip>:8000/v1
      pt_BR: |
        Requisitos:
        - OrangePi 5 ou placa RK3588 com 4GB+ RAM
        - GPU Mali G610 (OpenCL)
        - Imagem tem ~4.5GB (modelo incluso)
        - Conectar OpenWebUI: http://<ip-dispositivo>:8000/v1
  index: /v1/models
  port_map: "8000"
