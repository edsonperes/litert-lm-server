name: litert-lm-server
services:
  litert-lm:
    image: ghcr.io/edsonperes/litert-lm-server:1.1.2
    container_name: litert-lm-server
    restart: unless-stopped
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    environment:
      MODEL_REPO: litert-community/gemma-4-E2B-it-litert-lm
      MODEL_FILE: gemma-4-E2B-it.litertlm
      MODEL_DIR: /data/models
      MODEL_ID: gemma-4-E2B-it
      PORT: "8000"
    volumes:
      - type: bind
        source: /DATA/AppData/litert-lm-server/models
        target: /data/models
    deploy:
      resources:
        reservations:
          memory: "4096M"
    x-casaos:
      envs:
        - container: MODEL_REPO
          description:
            en_US: HuggingFace model repository
            pt_BR: Repositorio do modelo no HuggingFace
        - container: MODEL_FILE
          description:
            en_US: Model filename
            pt_BR: Nome do arquivo do modelo
      ports:
        - container: "8000"
          description:
            en_US: OpenAI-compatible API port
            pt_BR: Porta da API compativel com OpenAI
      volumes:
        - container: /data/models
          description:
            en_US: Model storage (persists downloaded models)
            pt_BR: Armazenamento de modelos (persiste downloads)

x-casaos:
  architectures:
    - arm64
  main: litert-lm
  author: edsonperes
  category: AI
  description:
    en_US: LLM inference server using Google LiteRT-LM with Gemma 4 E2B (2B). OpenAI-compatible API for OpenWebUI. Optimized for OrangePi 5 / ARM64.
    pt_BR: Servidor de inferencia LLM usando Google LiteRT-LM com Gemma 4 E2B (2B). API compativel com OpenAI para OpenWebUI. Otimizado para OrangePi 5 / ARM64.
  developer: Community
  icon: https://raw.githubusercontent.com/edsonperes/litert-lm-server/main/icon.png
  tagline:
    en_US: Gemma 4 E2B AI on OrangePi 5
    pt_BR: Gemma 4 E2B IA no OrangePi 5
  title:
    en_US: LiteRT-LM Gemma
    pt_BR: LiteRT-LM Gemma
  tips:
    before_install:
      en_US: |
        Requirements:
        - OrangePi 5 or ARM64 board with 4GB+ RAM
        - Model download (~2.6GB) on first launch
        - Connect OpenWebUI: http://<device-ip>:8000/v1
      pt_BR: |
        Requisitos:
        - OrangePi 5 ou placa ARM64 com 4GB+ RAM
        - Download do modelo (~2.6GB) na primeira execucao
        - Conectar OpenWebUI: http://<ip-dispositivo>:8000/v1
  index: /v1/models
  port_map: "8000"
