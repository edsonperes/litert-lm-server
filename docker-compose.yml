name: litert-lm-server
services:
  litert-lm:
    image: ghcr.io/edsonperes/litert-lm-server:0.1.0
    container_name: litert-lm-server
    restart: unless-stopped
    privileged: true
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    environment:
      MODEL_REPO: litert-community/gemma-4-E2B-it-litert-lm
      MODEL_FILE: gemma-4-E2B-it.litertlm
      MODEL_DIR: /data/models
      MODEL_ID: gemma-4-E2B-it
      PORT: "8000"
      INFERENCE_BACKEND: python
      BACKEND_TYPE: cpu
    volumes:
      - type: bind
        source: /DATA/AppData/litert-lm-server/models
        target: /data/models
      - type: bind
        source: /lib/firmware
        target: /lib/firmware
        read_only: true
    deploy:
      resources:
        reservations:
          memory: "4096M"
    x-casaos:
      envs:
        - container: MODEL_REPO
          description:
            en_US: HuggingFace model repository
            pt_BR: Repositorio do modelo no HuggingFace
        - container: MODEL_FILE
          description:
            en_US: Model filename
            pt_BR: Nome do arquivo do modelo
        - container: INFERENCE_BACKEND
          description:
            en_US: "Inference backend: python (CPU) or cli (GPU support)"
            pt_BR: "Backend de inferencia: python (CPU) ou cli (suporte GPU)"
        - container: BACKEND_TYPE
          description:
            en_US: "Backend type: cpu or gpu"
            pt_BR: "Tipo de backend: cpu ou gpu"
      ports:
        - container: "8000"
          description:
            en_US: OpenAI-compatible API port
            pt_BR: Porta da API compativel com OpenAI
      volumes:
        - container: /data/models
          description:
            en_US: Model storage (persists downloaded models)
            pt_BR: Armazenamento de modelos (persiste downloads)
        - container: /lib/firmware
          description:
            en_US: Mali GPU firmware (read-only)
            pt_BR: Firmware da GPU Mali (somente leitura)

x-casaos:
  architectures:
    - arm64
  main: litert-lm
  author: edsonperes
  category: AI
  description:
    en_US: On-device LLM inference server using Google LiteRT-LM with Gemma 4 E2B (2B). Provides an OpenAI-compatible API endpoint for use with OpenWebUI. Optimized for OrangePi 5 with Mali G610 GPU acceleration via OpenCL.
    pt_BR: Servidor de inferencia LLM local usando Google LiteRT-LM com Gemma 4 E2B (2B). Fornece endpoint API compativel com OpenAI para uso com OpenWebUI. Otimizado para OrangePi 5 com aceleracao GPU Mali G610 via OpenCL.
  developer: Community
  icon: https://raw.githubusercontent.com/edsonperes/litert-lm-server/main/icon.png
  tagline:
    en_US: Local AI inference with Gemma 4 on ARM64
    pt_BR: Inferencia IA local com Gemma 4 no ARM64
  title:
    en_US: LiteRT-LM Server
    pt_BR: LiteRT-LM Server
  tips:
    before_install:
      en_US: |
        Requirements:
        - OrangePi 5 or RK3588 board with 4GB+ RAM
        - Model download (~2.6GB) happens on first launch
        - For GPU: ensure mali_csffw.bin is in /lib/firmware
        - Connect OpenWebUI: http://<device-ip>:8000/v1
      pt_BR: |
        Requisitos:
        - OrangePi 5 ou placa RK3588 com 4GB+ RAM
        - Download do modelo (~2.6GB) ocorre na primeira execucao
        - Para GPU: garanta que mali_csffw.bin esta em /lib/firmware
        - Conectar OpenWebUI: http://<ip-dispositivo>:8000/v1
  index: /health
  port_map: "8000"
